name: Deploy mdBook to GitHub Pages
on:
  push:
    branches: ["main"] # Or "master" depending on your branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.37/mdbook-v0.4.37-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          chmod +x mdbook
      - name: Build Book
        run: ./mdbook build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './book' # This is the folder mdbook creates
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4